name: Publish to CocoaPods Spec Repo

on:
  push:
    tags:
      - '*'

jobs:
  lint-and-publish:
    runs-on: macos-latest
    env:
      LINT_PODSPEC_SOURCES: https://cdn.cocoapods.org/,https://github.com/livekit/podspecs.git
      LIVEKIT_PODSPEC_REPO_NAME: livekit-podspecs
      LIVEKIT_PODSPEC_REPO_URL: https://github.com/livekit/podspecs.git
      PILOT_PODSPEC_REPO_NAME: swiftpilot-podspecs
      PILOT_PODSPEC_REPO_URL: https://github.com/irov/swiftpilot-podspecs.git
      PILOT_PODSPEC_PAT_SECRET_NAME: SWIFTPILOT_PODSPEC_REPO_PAT
    steps:
      - uses: actions/checkout@v5

      - name: Configure git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare CocoaPods spec repos
        run: |
          if [ ! -d "$HOME/.cocoapods/repos/trunk" ]; then
            pod repo add-cdn trunk https://cdn.cocoapods.org/
          fi

          if [ -d "$HOME/.cocoapods/repos/${LIVEKIT_PODSPEC_REPO_NAME}" ]; then
            pod repo update "${LIVEKIT_PODSPEC_REPO_NAME}"
          else
            pod repo add "${LIVEKIT_PODSPEC_REPO_NAME}" "${LIVEKIT_PODSPEC_REPO_URL}"
          fi

      - name: Patch CocoaPods validator for Xcode 16 deployment targets
        run: |
          ruby <<'RUBY'
          require 'rubygems'

          validation_target = '13.0'

          gem_dir = Gem::Specification.find_by_name('cocoapods').gem_dir
          validator_path = File.join(gem_dir, 'lib/cocoapods/validator.rb')
          analyzer_path = File.join(gem_dir, 'lib/cocoapods/installer/analyzer.rb')

          validator = File.read(validator_path)
          validator_target_bump = validator.sub!(/minimum = Version\.new\('8\.0'\)/, "minimum = Version.new('#{validation_target}')")
          validator_flags_patch = validator.sub!(
            /(\(build_configuration\.build_settings\['OTHER_CFLAGS'\] \|\|= '\$\(inherited\)'\) << ' -Wincomplete-umbrella')/,
            "\\1\n          build_configuration.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '#{validation_target}' if consumer.platform_name == :ios"
          )
          validator_swift_patch_count = validator.gsub!(
            /(build_configuration\.build_settings\['SWIFT_VERSION'\] = swift_version)/,
            "build_configuration.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '#{validation_target}' if consumer.platform_name == :ios\n              \\1"
          )
          raise 'Failed to patch CocoaPods validator deployment target minimum' unless validator_target_bump
          raise 'Failed to patch CocoaPods validator OTHER_CFLAGS section' unless validator_flags_patch
          raise 'Failed to patch CocoaPods validator SWIFT_VERSION sections' unless validator_swift_patch_count
          File.write(validator_path, validator)

          analyzer = File.read(analyzer_path)
          analyzer_patch = analyzer.sub!(/minimum = Version\.new\('8\.0'\)/, "minimum = Version.new('#{validation_target}')")
          raise 'Failed to patch CocoaPods analyzer deployment target minimum' unless analyzer_patch
          File.write(analyzer_path, analyzer)

          puts "Patched CocoaPods in #{gem_dir}"
          RUBY

      - name: Validate podspec
        run: pod spec lint PilotSDK.podspec --allow-warnings --sources="${LINT_PODSPEC_SOURCES}"

      - name: Publish to swiftpilot podspec repo
        run: |
          SWIFTPILOT_PODSPEC_REPO_PAT="${{ secrets[env.PILOT_PODSPEC_PAT_SECRET_NAME] }}"

          if [ -z "${SWIFTPILOT_PODSPEC_REPO_PAT}" ]; then
            echo "::warning::SWIFTPILOT_PODSPEC_REPO_PAT is not configured; skipping podspec repo publish."
            exit 0
          fi

          PUSH_URL="https://x-access-token:${SWIFTPILOT_PODSPEC_REPO_PAT}@github.com/irov/swiftpilot-podspecs.git"

          if [ -d "$HOME/.cocoapods/repos/${PILOT_PODSPEC_REPO_NAME}" ]; then
            git -C "$HOME/.cocoapods/repos/${PILOT_PODSPEC_REPO_NAME}" remote set-url origin "${PUSH_URL}"
            pod repo update "${PILOT_PODSPEC_REPO_NAME}"
          else
            pod repo add "${PILOT_PODSPEC_REPO_NAME}" "${PUSH_URL}"
          fi

          pod repo push "${PILOT_PODSPEC_REPO_NAME}" PilotSDK.podspec \
            --sources="${LINT_PODSPEC_SOURCES},${PILOT_PODSPEC_REPO_URL}" \
            --allow-warnings
