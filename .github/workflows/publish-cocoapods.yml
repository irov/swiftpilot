name: Publish to CocoaPods

on:
  push:
    tags:
      - '*'

jobs:
  lint-and-publish:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Add LiveKit podspec repo
        run: pod repo add livekit https://github.com/livekit/podspecs.git

      - name: Validate podspec
        run: pod spec lint PilotSDK.podspec --allow-warnings --sources='livekit,trunk'

      - name: Publish to CocoaPods trunk
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
        run: pod trunk push PilotSDK.podspec --allow-warnings
